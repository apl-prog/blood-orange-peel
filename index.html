<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Experimental Mix Apparatus</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="wrap standby" id="wrap">
      <header class="top">
        <div class="title">
          <h1>Experimental Mix Apparatus</h1>
          <p class="sub">BenjiMada Archive Terminal. Five configurations. Three channels.</p>
        </div>
        <div class="status" id="status">STANDBY</div>
      </header>

      <section class="stage">
        <svg
          id="orange"
          class="orange"
          viewBox="0 0 300 300"
          role="img"
          aria-label="Interactive orange with five wedges and a center core"
        >
          <defs>
            <radialGradient id="g" cx="50%" cy="45%" r="65%">
              <stop offset="0%" stop-opacity="0.25"></stop>
              <stop offset="100%" stop-opacity="0.0"></stop>
            </radialGradient>
          </defs>

          <circle cx="150" cy="150" r="119.5" class="orange-base"></circle>
          <circle cx="150" cy="150" r="120" fill="url(#g)"></circle>

          <!-- 5 outer wedges -->
          <path class="wedge" data-state="Skeleton"
            d="M150 150 L150 30 A120 120 0 0 1 264 112 Z"></path>
          <path class="wedge" data-state="Narrator"
            d="M150 150 L264 112 A120 120 0 0 1 221 251 Z"></path>
          <path class="wedge" data-state="Flesh"
            d="M150 150 L221 251 A120 120 0 0 1 79 251 Z"></path>
          <path class="wedge" data-state="Pulse"
            d="M150 150 L79 251 A120 120 0 0 1 36 112 Z"></path>
          <path class="wedge" data-state="Archive"
            d="M150 150 L36 112 A120 120 0 0 1 150 30 Z"></path>

          <!-- Center core -->
          <circle cx="150" cy="150" r="38" class="orange-center" data-state="Full Fruit"></circle>
        </svg>

        <div class="stateReadout mono" id="stateReadout">FULL FRUIT</div>

        <div class="controlStrip">
          <button id="enterBtn" class="primary">Enter</button>
          <button id="playPauseBtn" class="ghost" disabled>Play</button>
          <div class="hint">
            Tap the orange to change state.
            <br />
            If agent is using EYEPhone, switch Silent Mode off.
          </div>
        </div>
      </section>

      <footer class="foot">
        <div class="small mono" id="now">State: Full Fruit</div>
  <div class="spec mono" id="spec">
  SESSION: ---- · CHANNELS: 3 · CONFIGS: 5 · STATUS: STANDBY · RECOVERY TEAM:
  <a href="https://liberandos.com" target="_blank" rel="noopener" class="la5">LA5</a>
</div>
      </footer>
    </main>

    <script src="player.js"></script>
  </body>
</html>
