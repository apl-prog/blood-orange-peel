<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Blood Orange Peel</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="top">
        <div class="title">
          <h1>Blood Orange</h1>
          <p class="sub">Peel the mix. Five perspectives. Three stems.</p>
        </div>
        <div class="status" id="status">Ready.</div>
      </header>

      <section class="stage">
        <!-- Minimal “orange” visual. Click wedges OR use buttons below. -->
        <svg
          id="orange"
          class="orange"
          viewBox="0 0 300 300"
          role="img"
          aria-label="Interactive orange with five wedges"
        >
          <defs>
            <radialGradient id="g" cx="50%" cy="45%" r="65%">
              <stop offset="0%" stop-opacity="0.25"></stop>
              <stop offset="100%" stop-opacity="0.0"></stop>
            </radialGradient>
          </defs>

          <circle cx="150" cy="150" r="120" class="orange-base"></circle>
          <circle cx="150" cy="150" r="120" fill="url(#g)"></circle>

          <!-- 5 wedge hit-areas (simple paths). Each has data-state. -->
          <!-- Wedge geometry is approximate but works. -->
          <path class="wedge" data-state="Skeleton"
            d="M150 150 L150 30 A120 120 0 0 1 264 112 Z"></path>
          <path class="wedge" data-state="Narrator"
            d="M150 150 L264 112 A120 120 0 0 1 221 251 Z"></path>
          <path class="wedge" data-state="Flesh"
            d="M150 150 L221 251 A120 120 0 0 1 79 251 Z"></path>
          <path class="wedge" data-state="Pulse"
            d="M150 150 L79 251 A120 120 0 0 1 36 112 Z"></path>
          <path class="wedge" data-state="Full Fruit"
            d="M150 150 L36 112 A120 120 0 0 1 150 30 Z"></path>

          <circle cx="150" cy="150" r="38" class="orange-center"></circle>
          <text x="150" y="158" text-anchor="middle" class="orange-label" id="orangeLabel">
            Full Fruit
          </text>
        </svg>

        <div class="controls">
          <button id="enterBtn" class="primary">Enter</button>
          <button id="playPauseBtn" class="ghost" disabled>Play</button>

          <div class="mixRow" role="group" aria-label="Mix states">
            <button class="mixBtn" data-state="Skeleton" disabled>Skeleton</button>
            <button class="mixBtn" data-state="Narrator" disabled>Narrator</button>
            <button class="mixBtn" data-state="Flesh" disabled>Flesh</button>
            <button class="mixBtn" data-state="Pulse" disabled>Pulse</button>
            <button class="mixBtn" data-state="Full Fruit" disabled>Full Fruit</button>
          </div>

          <div class="hint">
            Tip: On iPhone, tap <span class="mono">Enter</span> first (it unlocks audio).
            <br />
  If you hear nothing, turn off Silent Mode (ringer switch on).
        </div>
      </section>

      <footer class="foot">
        <div class="small mono" id="now">State: Full Fruit</div>
      </footer>
    </main>

    <script src="player.js"></script>
  </body>
</html>
